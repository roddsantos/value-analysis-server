version: "3.8"

networks:
  value-analysis:

services:
  value-analysis-database:
    env_file: ./.env
    container_name: value-analysis-database
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root123
      - MYSQL_DATABASE=value-analysis-database
      - MYSQL_PASSWORD=root123
      - MYSQL_USER=root
      - MYSQL_ROOT_HOST='%'
    ports:
      - "3307:3306"
    networks:
      - value-analysis
    volumes:
      - db_data:/var/lib/mysql

  value-analysis-server:
    env_file: ./.env
    container_name: value-analysis-server
    build:
      context: .
      dockerfile: Dockerfile
    networks:
      - value-analysis
    ports:
      - "5071:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=value-analysis-database;Database=value-analysis-database;User=root;Password=root123;
    depends_on:
      - value-analysis-database

volumes:
  db_data:
